<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#8a11cf">
  <title>Cobrinha com Game Over</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: rgb(138, 17, 207);
      font-family: sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    canvas {
      border: 5px solid black;
      background: #fff;
      max-width: 100vw;
      width: 400px;
      height: 400px;
      touch-action: none;
    }

    #pause-btn, #restart-btn {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #score {
      font-size: 20px;
      color: white;
      margin-top: 10px;
    }

    #game-over {
      font-size: 24px;
      color: red;
      display: none;
    }

    #touch-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 10px;
    }

    #touch-controls .row {
      display: flex;
      justify-content: center;
    }

    #touch-controls button {
      width: 60px;
      height: 60px;
      font-size: 24px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      background: #eee;
      box-shadow: 2px 2px 5px #333;
      cursor: pointer;
    }

    #touch-controls button:active {
      background: #ccc;
    }

    #name-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 999;
    }

    #name-screen input {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }

    #name-screen button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }

    #final-screen {
      display: none;
      text-align: center;
      color: white;
      padding: 20px;
    }

    #final-ranking {
      text-align: left;
      margin: 0 auto;
      display: inline-block;
    }

    #play-again-btn {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="name-screen">
    <h2 style="color:white;">Digite seu nome para jogar</h2>
    <input type="text" id="player-name" placeholder="Seu nome" />
    <button id="start-game-btn">🎮 Iniciar</button>
  </div>

  <main>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="score">Pontos: 0</div>
    <div id="game-over">Game Over!</div>
    <button id="restart-btn">🔄 Reiniciar</button>
    <button id="pause-btn">⏸️ Pausar</button>
  </main>

  <div id="touch-controls">
    <div class="row">
      <button id="up">⬆️</button>
    </div>
    <div class="row">
      <button id="left">⬅️</button>
      <button id="down">⬇️</button>
      <button id="right">➡️</button>
    </div>
  </div>

  <!-- 🔥 Tela final com recorde -->
  <div id="final-screen">
    <h2>🎉 Fim de Jogo!</h2>
    <p id="final-score"></p>
    <h3>🏆 Ranking</h3>
    <ol id="final-ranking"></ol>
    <button id="play-again-btn">▶️ Jogar Novamente</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameOverText = document.getElementById('game-over');
    const scoreDisplay = document.getElementById('score');
    const restartBtn = document.getElementById('restart-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const nameScreen = document.getElementById('name-screen');
    const startGameBtn = document.getElementById('start-game-btn');
    const finalScreen = document.getElementById('final-screen');
    const finalScore = document.getElementById('final-score');
    const playAgainBtn = document.getElementById('play-again-btn');
  
    let isPaused = false;
    const gridSize = 20;
    const canvasSize = 400;
  
    let snake, direction, food, gameRunning, score;
    let playerName = '';
    const maxRanking = 10;
  
    let spaceImage = new Image();
    spaceImage.src = 'space.jpg';
  
    function startGame() {
      snake = [
        { x: 60, y: 60 },
        { x: 40, y: 60 },
        { x: 20, y: 60 }
      ];
      direction = 'RIGHT';
      food = generateFood();
      gameRunning = true;
      score = 0;
      scoreDisplay.innerText = 'Pontos: 0';
      gameOverText.style.display = 'none';
      restartBtn.style.display = 'none';
      pauseBtn.style.display = 'block';
      isPaused = false;
      pauseBtn.innerText = '⏸️ Pausar';
    }
  
    function drawBackground() {
      ctx.drawImage(spaceImage, 0, 0, canvas.width, canvas.height);
    }
  
    function drawSnake() {
      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? 'darkgreen' : 'limegreen';
        ctx.fillRect(segment.x, segment.y, gridSize, gridSize);
        ctx.strokeStyle = 'black';
        ctx.strokeRect(segment.x, segment.y, gridSize, gridSize);
        if (index === 0) drawEyes(segment.x, segment.y);
      });
    }
  
    function drawEyes(x, y) {
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(x + 5, y + 5, 3, 0, Math.PI * 2);
      ctx.arc(x + 15, y + 5, 3, 0, Math.PI * 2);
      ctx.fill();
  
      ctx.fillStyle = 'black';
      ctx.beginPath();
      ctx.arc(x + 5, y + 5, 1.5, 0, Math.PI * 2);
      ctx.arc(x + 15, y + 5, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  
    function moveSnake() {
      const head = { ...snake[0] };
  
      if (direction === 'RIGHT') head.x += gridSize;
      if (direction === 'LEFT') head.x -= gridSize;
      if (direction === 'UP') head.y -= gridSize;
      if (direction === 'DOWN') head.y += gridSize;
  
      if (head.x >= canvasSize) head.x = 0;
      if (head.x < 0) head.x = canvasSize - gridSize;
      if (head.y >= canvasSize) head.y = 0;
      if (head.y < 0) head.y = canvasSize - gridSize;
  
      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        gameOver();
        return;
      }
  
      snake.unshift(head);
  
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreDisplay.innerText = `Pontos: ${score}`;
        food = generateFood();
      } else {
        snake.pop();
      }
    }
  
    function drawFood() {
      ctx.fillStyle = 'red';
      ctx.fillRect(food.x, food.y, gridSize, gridSize);
    }
  
    function generateFood() {
      let newFood;
      do {
        const x = Math.floor(Math.random() * (canvasSize / gridSize)) * gridSize;
        const y = Math.floor(Math.random() * (canvasSize / gridSize)) * gridSize;
        newFood = { x, y };
      } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
      return newFood;
    }
  
    function changeDirection(event) {
      if (event.key === 'ArrowUp' && direction !== 'DOWN') direction = 'UP';
      if (event.key === 'ArrowDown' && direction !== 'UP') direction = 'DOWN';
      if (event.key === 'ArrowLeft' && direction !== 'RIGHT') direction = 'LEFT';
      if (event.key === 'ArrowRight' && direction !== 'LEFT') direction = 'RIGHT';
    }
  
    function gameOver() {
      gameRunning = false;
      gameOverText.style.display = 'block';
      restartBtn.style.display = 'none';
      pauseBtn.style.display = 'none';
      document.querySelector('main').style.display = 'none';
      finalScore.innerText = `Você fez ${score} pontos!`;
      finalScreen.style.display = 'block';
      checkAndSaveScore();
    }
  
    function gameLoop() {
      if (!gameRunning || isPaused) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      moveSnake();
      drawSnake();
      drawFood();
    }
  
    function getRanking() {
      return JSON.parse(localStorage.getItem('snakeRanking')) || [];
    }
  
    function saveRanking(ranking) {
      localStorage.setItem('snakeRanking', JSON.stringify(ranking));
    }
  
    function updateRankingDisplay() {
      const ranking = getRanking();
      const rankingList = document.getElementById('final-ranking');
      rankingList.innerHTML = '';
      ranking.forEach((entry, index) => {
        const li = document.createElement('li');
        li.textContent = `${index + 1}. ${entry.name} - ${entry.score} pts`;
        rankingList.appendChild(li);
      });
    }
  
    function checkAndSaveScore() {
      const ranking = getRanking();
      ranking.push({ name: playerName, score });
      ranking.sort((a, b) => b.score - a.score);
      if (ranking.length > 10) ranking.length = 10;
      saveRanking(ranking);
      updateRankingDisplay();
    }
  
    document.addEventListener('keydown', changeDirection);
  
    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseBtn.innerText = isPaused ? '▶️ Retomar' : '⏸️ Pausar';
    });
  
    restartBtn.addEventListener('click', startGame);
  
    document.getElementById('up').addEventListener('click', () => {
      if (direction !== 'DOWN') direction = 'UP';
    });
    document.getElementById('down').addEventListener('click', () => {
      if (direction !== 'UP') direction = 'DOWN';
    });
    document.getElementById('left').addEventListener('click', () => {
      if (direction !== 'RIGHT') direction = 'LEFT';
    });
    document.getElementById('right').addEventListener('click', () => {
      if (direction !== 'LEFT') direction = 'RIGHT';
    });
  
    startGameBtn.addEventListener('click', () => {
      const nameInput = document.getElementById('player-name');
      const name = nameInput.value.trim();
      if (!name) {
        alert('Digite seu nome para jogar!');
        return;
      }
      playerName = name;
      nameScreen.style.display = 'none';
      canvas.style.display = 'block';
      document.querySelector('main').style.display = 'flex';
      finalScreen.style.display = 'none';
      startGame();
    });
  
    playAgainBtn.addEventListener('click', () => {
      finalScreen.style.display = 'none';
      document.querySelector('main').style.display = 'flex';
      startGame();
    });
  
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('worker.js')
        .then(() => console.log('Service Worker registrado'))
        .catch(err => console.error('Erro ao registrar Service Worker:', err));
    }

    let touchStartX = 0;
let touchStartY = 0;

canvas.addEventListener('touchstart', function(e) {
  const touch = e.touches[0];
  touchStartX = touch.clientX;
  touchStartY = touch.clientY;
}, false);

canvas.addEventListener('touchend', function(e) {
  const touch = e.changedTouches[0];
  const deltaX = touch.clientX - touchStartX;
  const deltaY = touch.clientY - touchStartY;

  if (Math.abs(deltaX) > Math.abs(deltaY)) {
    // Movimento horizontal
    if (deltaX > 30 && direction !== 'LEFT') direction = 'RIGHT';
    else if (deltaX < -30 && direction !== 'RIGHT') direction = 'LEFT';
  } else {
    // Movimento vertical
    if (deltaY > 30 && direction !== 'UP') direction = 'DOWN';
    else if (deltaY < -30 && direction !== 'DOWN') direction = 'UP';
  }
}, false);

  
    setInterval(gameLoop, 100);
  </script>
</body>
</html>
